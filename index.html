<section style="
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    align-items:center;
    background:radial-gradient(circle at top, #1a1a1a, #000);
    text-align:center;
    font-family:Arial, sans-serif;
    color:white;
    position:relative;
    overflow:hidden;
">

    <!-- Glow Circle 1 -->
    <div style="
        position:absolute;
        width:300px;
        height:300px;
        background:#ff003c;
        border-radius:50%;
        filter:blur(120px);
        top:5%;
        left:15%;
        opacity:0.3;
    "></div>

    <!-- Glow Circle 2 -->
    <div style="
        position:absolute;
        width:250px;
        height:250px;
        background:#00f0ff;
        border-radius:50%;
        filter:blur(120px);
        bottom:10%;
        right:20%;
        opacity:0.3;
    "></div>

    <!-- TOP 1/3 CONTENT -->
    <div style="
        margin-top:8vh;
        width:100%;
        display:flex;
        justify-content:center;
    ">
        <div style="
            padding:30px 50px;
            border-radius:20px;
            background:rgba(255,255,255,0.05);
            backdrop-filter:blur(10px);
            box-shadow:0 0 30px rgba(255,0,60,0.2);
        ">

            <h1 style="
                font-size:3rem;
                color:#ff003c;
                letter-spacing:3px;
                margin-bottom:10px;
                text-shadow:0 0 15px #ff003c;
            ">
                MONEYHEIST AI BOT
            </h1>

            <p style="
                font-size:1.2rem;
                color:#ddd;
            ">
                Created By Mzazi Tech Inc.
            </p>

        </div>
    </div>

</section>
